name = "lustre_ui"
version = "0.6.0"
description = "A collection of components and design tokens for building Lustre apps."
target = "javascript"

licences = ["MIT"]

internal_modules = ["internals/*", "lustre/ui/internals"]

[dependencies]
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_stdlib = ">= 0.60.0 and < 2.0.0"
lustre = ">= 5.2.1 and < 6.0.0"
gleam_regexp = ">= 1.1.1 and < 2.0.0"
gleam_community_colour = ">= 2.0.2 and < 3.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 1.8.2 and < 2.0.0"
simplifile = ">= 2.2.0 and < 3.0.0"
